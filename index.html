<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Contractors Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
  .app { max-width: 480px; margin: 0 auto; background: #fff; min-height: 100vh; padding-bottom: 70px; }

  /* Header */
  .header { background: #1a237e; color: white; padding: 16px; }
  .header h1 { font-size: 18px; font-weight: 500; }
  .header p { font-size: 12px; opacity: 0.7; margin-top: 3px; }

  /* KPI Grid */
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 12px; background: #fff; }
  .kpi { background: #f5f5f5; border-radius: 10px; padding: 12px; }
  .kpi-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .kpi-value { font-size: 20px; font-weight: 600; color: #222; }
  .kpi-value.green { color: #0F6E56; }
  .kpi-value.red { color: #C62828; }
  .kpi-value.blue { color: #1a237e; }

  /* Filter Chips */
  .chips { display: flex; gap: 8px; padding: 10px 12px; overflow-x: auto; border-bottom: 1px solid #eee; }
  .chips::-webkit-scrollbar { display: none; }
  .chip { font-size: 12px; padding: 5px 14px; border-radius: 99px; border: 1px solid #ddd; white-space: nowrap; cursor: pointer; background: #fff; color: #666; transition: all 0.15s; }
  .chip.active { background: #E6F1FB; color: #1a237e; border-color: #90CAF9; font-weight: 500; }

  /* Section Label */
  .section-label { font-size: 11px; font-weight: 600; color: #999; padding: 10px 12px 4px; text-transform: uppercase; letter-spacing: 0.6px; }

  /* Contractor Row */
  .contractor-row { display: flex; align-items: center; gap: 12px; padding: 12px; border-bottom: 1px solid #f0f0f0; background: #fff; }
  .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
  .info { flex: 1; min-width: 0; }
  .name { font-size: 14px; font-weight: 600; color: #222; }
  .prog-bg { height: 4px; background: #eee; border-radius: 99px; margin: 5px 0 3px; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 99px; transition: width 0.5s; }
  .sub { font-size: 11px; color: #999; }
  .right { text-align: right; flex-shrink: 0; }
  .amount { font-size: 14px; font-weight: 600; }
  .amount.due { color: #0F6E56; }
  .amount.over { color: #C62828; }
  .amount.set { color: #1a237e; }
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 99px; margin-top: 4px; display: inline-block; font-weight: 500; }
  .badge-due { background: #E8F5E9; color: #2E7D32; }
  .badge-over { background: #FFEBEE; color: #C62828; }
  .badge-set { background: #E3F2FD; color: #1565C0; }

  /* Loading / Error */
  .loading { padding: 40px; text-align: center; color: #999; font-size: 14px; }
  .spinner { width: 32px; height: 32px; border: 3px solid #eee; border-top-color: #1a237e; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { margin: 16px; padding: 16px; background: #FFEBEE; border-radius: 10px; color: #C62828; font-size: 13px; text-align: center; line-height: 1.6; }

  /* Tab Bar */
  .tab-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; display: flex; background: #fff; border-top: 1px solid #eee; padding: 8px 0 12px; z-index: 100; }
  .tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; color: #999; cursor: pointer; }
  .tab.active { color: #1a237e; }
  .tab-icon { width: 22px; height: 22px; }
  .fab-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; margin-top: -20px; }
  .fab { width: 50px; height: 50px; border-radius: 50%; background: #1a237e; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(26,35,126,0.4); cursor: pointer; }
  .fab svg { width: 24px; height: 24px; }
  .fab-label { font-size: 10px; color: #999; margin-top: 4px; }

  /* Summary bar */
  .summary-bar { background: #1a237e; color: white; padding: 8px 12px; font-size: 11px; display: flex; justify-content: space-between; }
  .summary-bar span { opacity: 0.85; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Contractors Status</h1>
    <p id="last-updated">Loading data...</p>
  </div>

  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-label">Total Due (Invoiced)</div><div class="kpi-value blue" id="k-due">—</div></div>
    <div class="kpi"><div class="kpi-label">Total Paid</div><div class="kpi-value green" id="k-paid">—</div></div>
    <div class="kpi"><div class="kpi-label">Net Balance</div><div class="kpi-value red" id="k-bal">—</div></div>
    <div class="kpi"><div class="kpi-label">Contractors</div><div class="kpi-value" id="k-count">—</div></div>
  </div>

  <div class="chips">
    <div class="chip active" onclick="filterBy('all',this)">All</div>
    <div class="chip" onclick="filterBy('Due',this)">Has Balance</div>
    <div class="chip" onclick="filterBy('Overpaid',this)">Overpaid</div>
    <div class="chip" onclick="filterBy('Settled',this)">Settled</div>
  </div>

  <div class="section-label">Contractors List</div>
  <div id="list">
    <div class="loading"><div class="spinner"></div>Fetching live data from Google Sheets...</div>
  </div>

  <div class="tab-bar">
    <div class="tab active">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      <span>Overview</span>
    </div>
    <div class="tab">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Contractors</span>
    </div>
    <div class="fab-wrap">
      <div class="fab">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
      <div class="fab-label">Payment</div>
    </div>
    <div class="tab">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span>Reports</span>
    </div>
    <div class="tab">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      <span>Settings</span>
    </div>
  </div>
</div>

<script>
const SHEET_ID = '1iqJSP2HuROO4LwGu9Smph78d1W1iRW_S32sOp2nUmR4';
const SHEET = 'CONTRACTORS_SUMMARY';
const API_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET)}`;

const COLORS = [
  {bg:'#E3F2FD',fg:'#1565C0'},{bg:'#E8F5E9',fg:'#2E7D32'},
  {bg:'#FFF3E0',fg:'#E65100'},{bg:'#F3E5F5',fg:'#6A1B9A'},
  {bg:'#E0F2F1',fg:'#00695C'},{bg:'#FCE4EC',fg:'#880E4F'},
  {bg:'#E8EAF6',fg:'#283593'},{bg:'#FFF8E1',fg:'#F57F17'},
];

let allData = [];
let activeFilter = 'all';

function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return '0';
  return Math.abs(Math.round(n)).toLocaleString();
}

function parseVal(v) {
  if (v === null || v === undefined) return 0;
  return parseFloat(String(v).replace(/,/g,'').replace(/[^0-9.\-]/g,'')) || 0;
}

function initials(name) {
  const p = (name||'').trim().split(/\s+/);
  return p.length > 1 ? (p[0][0]+p[1][0]).toUpperCase() : (name||'??').slice(0,2).toUpperCase();
}

function renderContractors(data) {
  const el = document.getElementById('list');
  if (!data.length) {
    el.innerHTML = '<div class="loading">No contractors found for this filter.</div>';
    return;
  }
  el.innerHTML = data.map((r, i) => {
    const c = COLORS[i % COLORS.length];
    const net = parseVal(r.netDue);
    const comp = r.completion;
    const lastPay = parseVal(r.lastPay);
    const status = r.status || (net > 0 ? 'Due' : net < 0 ? 'Overpaid' : 'Settled');
    const progW = Math.min(Math.max(comp, 0), 100);
    const progColor = progW >= 90 ? '#2E7D32' : progW >= 60 ? '#1565C0' : '#E65100';
    const amtClass = net > 0 ? 'due' : net < 0 ? 'over' : 'set';
    const badgeClass = status === 'Due' ? 'badge-due' : status === 'Overpaid' ? 'badge-over' : 'badge-set';
    const amtText = net === 0 ? 'Settled' : `${net > 0 ? '' : '-'}${fmt(net)}`;
    return `
    <div class="contractor-row">
      <div class="avatar" style="background:${c.bg};color:${c.fg}">${initials(r.name)}</div>
      <div class="info">
        <div class="name">${r.name}</div>
        <div class="prog-bg"><div class="prog-fill" style="width:${progW}%;background:${progColor}"></div></div>
        <div class="sub">${comp.toFixed(1)}% done &nbsp;·&nbsp; Last paid: ${fmt(lastPay)}</div>
      </div>
      <div class="right">
        <div class="amount ${amtClass}">${amtText}</div>
        <div class="badge ${badgeClass}">${status}</div>
      </div>
    </div>`;
  }).join('');
}

function filterBy(f, el) {
  activeFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  const filtered = f === 'all' ? allData : allData.filter(r => (r.status||'') === f);
  renderContractors(filtered);
}

function updateKPIs(data) {
  let due = 0, paid = 0, bal = 0;
  data.forEach(r => {
    due  += parseVal(r.totalDue);
    paid += parseVal(r.prevPayment);
    bal  += parseVal(r.netDue);
  });
  document.getElementById('k-due').textContent   = fmt(due);
  document.getElementById('k-paid').textContent  = fmt(paid);
  document.getElementById('k-bal').textContent   = fmt(Math.abs(bal));
  document.getElementById('k-count').textContent = data.length;
  document.getElementById('k-bal').className = 'kpi-value ' + (bal >= 0 ? 'red' : 'green');
}

async function loadData() {
  try {
    const res  = await fetch(API_URL);
    const text = await res.text();
    const json = JSON.parse(text.replace(/^[^\(]+\(/, '').replace(/\);?\s*$/, ''));
    const rows = json.table.rows || [];

    allData = rows.map((row, i) => {
      const g = (idx) => row.c?.[idx]?.v ?? null;
      const raw6 = g(6);
      let comp = 0;
      if (raw6 !== null) {
        const s = String(raw6);
        comp = s.includes('%') ? parseFloat(s) : parseFloat(s) * 100;
        if (isNaN(comp)) comp = 0;
      }
      return {
        name:        String(g(0) || ''),
        totalDue:    g(1),
        prevPayment: g(2),
        lastPay:     g(3),
        lastDate:    g(4),
        netDue:      g(5),
        completion:  comp,
        status:      String(g(7) || ''),
      };
    }).filter(r => r.name && r.name.trim());

    const now = new Date();
    document.getElementById('last-updated').textContent =
      `Live data · Updated ${now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}`;

    updateKPIs(allData);
    renderContractors(allData);
  } catch(err) {
    document.getElementById('list').innerHTML = `
      <div class="error-box">
        Failed to load data.<br>
        Make sure the sheet sharing is set to:<br>
        <strong>"Anyone with the link — Viewer"</strong>
      </div>`;
    console.error(err);
  }
}

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
